name: CI # Название пайплайна

on: # Триггер (Когда кто-то делает git push — запускай workflow.)
  push

permissions:
  contents: read
  packages: write

jobs: # Создаем задачу

  test: # Сама задача

    runs-on: ubuntu-latest # Runner
    
    steps:
      - name: Checkout code # Скачивание кода с GitHub
        uses: actions/checkout@v4

      - name: Setup Python # Установка Python на чистый Runner
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Указываем точную версию

      - name: Install dependencies # Установка зависимостей в ручную
        run: |
          pip install -r requirements.txt

      - name: Run Pytest # Запуск тестов
        run: |
          pytest

      - name: Login to GHCR
        uses: docker/login-action@v3 # Что запустить
        with: # С какими параметрами
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:1.0.0
  
  deploy:

    needs: test # Deploy можно запускать только если test прошёл.

    runs-on: ubuntu-latest

    steps:
      
      - name: Deploy
        run: |
          echo "Deploying application..."
          echo "docker compose pull"
          echo "docker compose up -d"
