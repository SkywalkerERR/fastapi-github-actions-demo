name: CI # Название пайплайна

on: # Триггер (Когда кто-то делает git push — запускай workflow.)
  push

permissions:
  contents: read
  packages: write

jobs: # Создаем задачу

  test: # Сама задача
    runs-on: ubuntu-latest # Runner
    
    steps:
      - name: Checkout code # Скачивание кода с GitHub
        uses: actions/checkout@v4

      - name: Setup Python # Установка Python на чистый Runner
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Указываем точную версию

      - name: Install dependencies # Установка зависимостей в ручную
        run: |
          pip install -r requirements.txt

      - name: Run Pytest # Запуск тестов
        run: |
          pytest

      - name: Login to GHCR
        uses: docker/login-action@v3 # Что запустить
        with: # С какими параметрами
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
      